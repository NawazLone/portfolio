<div class="skills-container">
  <div class="skills-title">
    <span class="section-label">
      <span class="material-icons">code</span>
      Skills
    </span>
    <h2>Technical Skills</h2>
    <p>Technologies and tools I work with</p>
  </div>

  <div class="skills-grid">
    <div
      *ngFor="let skill of skills"
      class="skill-card tilt-card"
      (mouseenter)="onMouseEnter(skill)"
      (mouseleave)="onMouseLeave()"
    >
      <div class="skill-icon" [style.borderColor]="skill.color + '40'">
        <span class="material-icons" [style.color]="skill.color">{{ skill.icon }}</span>
      </div>
      <div class="skill-info">
        <h3>{{ skill.name }}</h3>
        <div class="skill-bar">
          <div
            class="skill-progress"
            [style.width.%]="skill.percentage"
            [style.background]="skill.color"
          ></div>
        </div>
        <span class="skill-percentage">{{ skill.percentage }}%</span>
      </div>
    </div>
  </div>

  <div class="tooltip" *ngIf="showTooltip && hoveredSkill">
    <p>{{ hoveredSkill.name }} - {{ hoveredSkill.percentage }}% proficiency</p>
  </div>
</div>
